name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Reset iOS Pods
        run: |
          cd ios
          rm -f Podfile.lock
          rm -rf Pods
          pod deintegrate || true
          cd ..

      - name: Set iOS minimum version to 15
        run: |
          if [ ! -f ios/Podfile ]; then
            cd ios
            pod init
            cd ..
          fi

          if grep -q "platform :ios" ios/Podfile; then
            sed -i '' "s/platform :ios, .*/platform :ios, '15.0'/" ios/Podfile
          else
            echo "platform :ios, '15.0'" | cat - ios/Podfile > temp && mv temp ios/Podfile
          fi

          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Pod install
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS without codesign
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r AbsensiGeo.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AbsensiGeo-IPA
          path: AbsensiGeo.ipa