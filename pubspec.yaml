name: absensi_geo_mobile
description: "Aplikasi Absensi Karyawan berbasis lokasi."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^15.1.2
  google_fonts: ^6.2.1
  intl: ^0.20.2
  geolocator: ^14.0.0
  camera: ^0.11.1
  path_provider: ^2.1.5
  supabase_flutter: ^2.15.3
  csv: ^6.0.0
  share_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.0

flutter_native_splash:
  color: "#000000"
  image: "assets/img/splash.png"
  android_12:
    color: "#000000"
    image: "assets/img/splash.png"

flutter:
  uses-material-design: true
  assets:
    - assets/img/
